[supervisord]
nodaemon=true
user=root

[program:cron]
command=cron -f
autostart=true
autorestart=true
stderr_logfile=/var/log/cron.err.log
stdout_logfile=/var/log/cron.out.log

[program:flask]
command=python3 /app/webapp/app.py
directory=/app/webapp
autostart=true
autorestart=true
environment=STATUS_DIR="/app/status",PYTHONUNBUFFERED="1"
stderr_logfile=/var/log/flask.err.log
stdout_logfile=/var/log/flask.out.log
